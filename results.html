<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This webpage is a project for BYU WDD231. You can use this page to calculate how inflation impacts the value of money over some given time period that you choose.">
    <meta name="theme-color" content="#121316">
    <link rel="icon" type="image/png" href="images/inflationtimemachine-logo.png">
    <title>Inflation Time Machine - Results</title>
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/subpage.js"></script>
</head>
<body>
    <header>
        <a href="index.html"><img src="images/inflationtimemachine-logo.webp" alt="logo" fetchpriority="high"></a>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <nav>
            <a href="index.html">Home</a>
            <a href="results.html">Results</a>
        </nav>
    </header>
    <main>
        <section id="results-panel">
            <div id="graph">
                <h1>Dollar Value Growth</h1>
                <img src="images/inflationtimemachine-logo.webp" alt="Dollar value growth graph">
            </div>
            <div class="result-row" id="search">
                <div class="data-point">
                    <h1>Base Year</h1>
                    <p id="display-start-year">—</p>
                </div>
                <div class="data-point">
                    <h1>Amount</h1>
                    <p id="display-amount">—</p>
                </div>
                <div class="data-point">
                    <h1>End Year</h1>
                    <p id="display-end-year">—</p>
                </div>
            </div>
            <div class="result-row result-highlight" id="end">
                <div class="data-point">
                    <h1>End Amount</h1>
                    <p id="display-adjusted">—</p>
                </div>
                <div class="data-point">
                    <h1>Multiplier</h1>
                    <p id="display-multiplier">—</p>
                </div>
            </div>
            <details class="buy-section" name="items">
                <summary>What can you buy with this?</summary>
                <ul class="itemList" id="display-items">
                </ul>
            </details>
        </section>
    </main>

    <footer>
        <div id="topLevel">
            <img src="images/inflationtimemachine-logo.webp" alt="logo">
            <a href="results.html">Results</a>
            <div class="social">
                <!--  I copied and pasted from past work in web classes -->
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
                <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>
        </div>
        <div id="bottomLevel">
            <p>&copy; 2026 Inflation Time Machine. All rights reserved.</p>
            <p>Privacy Policy</p>
            <p>Terms of Service</p>
        </div>
    </footer>
</body>
</html>
