<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Inflation Time Machine - Results</title>
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/subpage.js"></script>
</head>
<body>
    <header>
        <a href="index.html"><img src="images/inflationtimemachine-logo.webp" alt="logo" fetchpriority="high"></a>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <nav>
            <a href="index.html">Home</a>
            <a href="results.html">Results</a>
        </nav>
    </header>
    <main>
        <section id="graph">
            <h1>Dollar Value Growth</h1>
            <img src="images/inflationtimemachine-logo.webp" alt="Dollar value growth graph">
        </section>

        <section id="search">
            <h1>Base Year</h1>
            <p id="display-start-year">—</p>
            <h1>Amount</h1>
            <p id="display-amount">—</p>
            <h1>End Year</h1>
            <p id="display-end-year">—</p>
        </section>

        <section id="end">
            <h1>End Amount</h1>
            <p id="display-adjusted">—</p>
            <h1>Multiplier</h1>
            <p id="display-multiplier">—</p>
            <details class="times" name="items">
                <summary>What can it buy?</summary>
                <ul class="itemList" id="display-items">
                </ul>
            </details>
        </section>
    </main>

    <footer>
        <div id="topLevel">
            <img src="images/inflationtimemachine-logo.webp" alt="logo">
            <a href="results.html">Results</a>
            <div class="social">
                <!--  I copied and pasted from past work in web classes -->
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->

                <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>
        </div>
        <div id="bottomLevel">
            <p>&copy; 2026 Inflation Time Machine. All rights reserved.</p>
            <p>Privacy Policy</p>
            <p>Terms of Service</p>
        </div>
    </footer>
</body>
</html>
